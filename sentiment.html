<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentimental Analysis</title>
    <!-- <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}"> -->
    <style>
/* ========== Base Styles ========== */
body {
    background: linear-gradient(135deg, #0a0a0f, #3a0d12);
    margin: 0;
    padding: 20px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    color: white;
}

/* Headings */
h1 {
    color: #FBFEF9;
    text-align: center;
    font-size: 50px;
    font-family: 'Poppins', sans-serif;
    animation: fadeIn 1s ease-in-out;
}
h2 {
    color: teal;
    text-align: center;
    font-size: 30px;
    font-family: 'Times New Roman', Times, serif;
}
h1, h2, h3 {
    font-family: 'Montserrat', sans-serif;
}

/* Form Container */
form {
    max-width: 600px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 16px;
    background: #3a0d12;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

/* Labels */
label {
    display: block;
    margin-bottom: 10px;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
}

/* Input Box */
input[type="text"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

/* Buttons */
input[type="submit"] {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.3s ease;
    font-weight: bold;
    transition: 0.3s ease;
}
input[type="submit"]:hover { 
    color: #000;
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(0, 114, 255, 0.6);
}

/* Result Box */
.result {
    margin-top: 30px;
    padding: 20px;
    background-color: #0d1b3c;
    border-radius: 16px;
    border: 2px solid #14ff89;
    box-shadow: 0 4px 24px rgba(20,255,137,0.10), 0 1.5px 8px rgba(0,0,0,0.10);
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    animation: fadeIn 1s ease-in-out;
}
.result h3 {
    color: #14ff89;
    margin-bottom: 10px;
}
.result ul {
    margin-left: 0;
    padding-left: 20px;
    list-style-type: none;
}
.result li, .result p {
    font-size: 18px;
    margin-bottom: 8px;
}

/* ========== Animations ========== */
@keyframes spin {
    to { transform: rotate(360deg); }
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ========== Mobile Styles ========== */
@media (max-width: 600px) {
    h1 { font-size: 32px; }
    h2 { font-size: 22px; }
    form { padding: 18px; }
    input[type="text"], input[type="submit"] { width: 100%; font-size: 15px; }
    .result { padding: 15px; }
}

        
    </style>  
</head>
<body>
    <h1>SENTIMENTAL&nbsp;&nbsp;&nbsp;&nbsp;ANALYSIS</h1>
</nav>
    <form action="/sentiment-text" method="post">
        <label for="text">Enter Text:</label>
        <input type="text" id="text" name="text"  placeholder="Enter required  text "required>
        <br>
        <input type="submit" value="Analyze Sentiment">
    </form>
    <!-- for selection of audio for sentimental analysis  -->
<form action="/sentiment-audio" method="post" enctype="multipart/form-data">
    <h3>Or</h3>
    <!-- <label for="audioText">Enter Audio Text:</label>    
    <input type="text" id="audioText" name="audioText" placeholder="Enter text from audio" required>
    <br>
    <br> -->
    <label for="audioFile">Upload an audio file for sentiment analysis:</label>
    <input type="file" id="audioFile" name="audioFile" accept="audio/*" required>
    <br>
    <br>
    <input type="submit" value="Analyze Sentiment from Audio">
</form>
    <br>
{% if emotions %}
<div class="result">
    <p><strong>Text:</strong> {{ text }}</p>
    <br>
    <h3>Detected Emotions:</h3>
    <ul>
        {% for emotion in emotions %}
        <li><b>{{ emotion.label }}:</b> {{ '%.2f'|format(emotion.score * 100) }}%</li>
        <br>
        {% endfor %}
    </ul>
</div>
{% else %}
    <p>No emotion analysis result available.</p>
    {% endif %} 
    <br>
    <button onclick="location.href='/'">Back to Home</button>
    <br>
    <br>
</body>
</html>
