<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Summarizer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
<style>
/* ========== Global Styles ========== */
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, 
               Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  background-color: #21295C;
  margin: 0;
  padding: 0;
  color: white;
  background: linear-gradient(135deg, #0a0a0f, #3a0d12);
  color: #FBFEF9;
}

/* ========== Container ========== */
.container {
  max-width: 850px;
  margin: 50px auto;
  padding: 25px 35px;
  margin-top: 50px;
  border-radius: 16px;
  background: #3a0d12;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  animation: fadeIn 1s ease-in-out;
}

/* ========== Headings ========== */
h1, h2 {
  text-align: center;
  color: #FBFEF9;
  font-family: 'Poppins', sans-serif;
  margin-bottom: 20px;
}

h1 {
  font-size: 42px;
}

h2 {
  font-size: 28px;
  color: #FBFEF9;
}

/* ========== Labels ========== */
label {
  font-weight: bold;
  display: block;
  margin-top: 15px;
  font-size: 18px;
}

/* ========== Textarea ========== */
textarea {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 2px solid #0C6291;
  background: #A63446;
  color: #FBFEF9;
  font-size: 16px;
  resize: vertical;
  margin-top: 10px;
  margin-bottom: 20px;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

textarea:focus {
  outline: none;
  border-color: #FF810B;
  box-shadow: 0 0 12px #FF810B;
}

/* ========== Buttons ========== */
button, input[type="submit"], .back-btn {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover, input[type="submit"]:hover, .back-btn:hover {
  background-color: #76dce8;
  color: #000;
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(0, 114, 255, 0.6);
}

/* ========== Result Box ========== */
.result {
  margin-top: 30px;
  padding: 20px;
  border-radius: 12px;
  background-color: #0A4A66;
  color: #fff;
  border: 2px solid #14ff89;
  box-shadow: 0 4px 20px rgba(20,255,137,0.15), 
              0 2px 10px rgba(0,0,0,0.2);
  animation: fadeIn 1s ease-in-out;
}

.result h2 {
  color: #FBFEF9;
  text-align: center;
  margin-bottom: 12px;
}

.result p {
  color: #f1f1f1;
  line-height: 1.6;
  font-size: 18px;
  font-weight: normal;
}

.result p strong { 
  font-weight: bold;
  color: #FF810B;
}

/* ========== Animations ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
  <div class="container">
    <h1>Text & Audio Summarizer</h1>

    <!-- TEXT SUMMARY FORM -->
    <form action="/summarize" method="post">
      <label for="text">Enter or Paste Long Text:</label><br>
      <textarea id="text" name="text" rows="8" placeholder="Paste your text here..."></textarea><br>
      <button type="submit">Summarize Text</button>
    </form>

    <h2>OR Upload Audio for Summary</h2>

    <!-- AUDIO SUMMARY FORM -->
    <form action="/summarize" method="post" enctype="multipart/form-data">
      <label for="audioFile">Upload an Audio File:</label>
      <input type="file" id="audioFile" name="audioFile" accept="audio/*">
      <button type="submit">Summarize Audio</button>
    </form>

    <!-- RESULT BOX -->
    {% if summary %}
    <div class="result">
      {% if audio %}
        <h2>Transcribed from Audio:</h2>
      {% else %}
        <h2>Summarized Text:</h2>
      {% endif %}
      <p>{{ summary }}</p>
    </div>
    {% endif %}
    
    <br>
    <button onclick="location.href='/'">Back to Home</button>  
  </div>   
</body>
</html>
